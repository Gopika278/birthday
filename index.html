<!DOCTYPE html>
<html>
<head>
<title>For You Both 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: linear-gradient(pink, lightpink);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* envelope */
.envelope {
  width: 180px;
  height: 120px;
  background: red;
  position: absolute;
  border-radius: 10px;
  cursor: pointer;
}

.top {
  width: 100%;
  height: 100%;
  background: darkred;
  position: absolute;
  transform-origin: top;
  transition: 0.6s;
}

.letter {
  display: none;
  position: absolute;
  background: white;
  width: 90%;
  height: 70%;
  top: 15%;
  left: 5%;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}

.open .top {
  transform: rotateX(180deg);
}

/* center content */
#content {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

/* photo */
img {
  width: 120px;
  border-radius: 50%;
 }

/* final blast */
#final {
  display: none;
  font-size: 10px;
  color: red;
  text-align: center;
  padding: 10px;
  animation: zoom 1s infinite alternate;
}

@keyframes zoom {
  from { transform: scale(1); }
  to { transform: scale(1.3); }
}

/* hearts */
body::before {
  content: "💖 💕 💗 💓 💘 💝";
  position: absolute;
  font-size: 30px;
  animation: float 10s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-100vh); }
}
</style>

</head>
<body>

<div id="content">
  <div class="envelope" id="env">
    <div class="top"></div>
    <div class="letter" id="letter">
      <p id="msg"></p>
      <img src="photo.jpg">
    </div>
  </div>

  <h1 id="final">💖 HAPPY BIRTHDAY TO MY CHELLAKUTTIESS💖</h1>
</div>

<audio id="music" src="music.mp3"></audio>

<script>
let text = [
  "Hey Kutties ❤️",
  "I have something for you two 😊",
  "You two are very special to me 💖",
  "This is for you two 🎉"
];

let i = 0;
let j = 0;

function startStory() {
  document.getElementById("music").play();
  nextMessage();
}

function nextMessage() {
  if (i < text.length) {
    document.getElementById("env").classList.add("open");
    document.getElementById("letter").style.display = "block";

    let msg = text[i];
    document.getElementById("msg").innerHTML = "";

    typeEffect(msg, 0, () => {
      setTimeout(() => {
        document.getElementById("env").classList.remove("open");
        document.getElementById("letter").style.display = "none";
        i++;
        setTimeout(nextMessage, 800);
      }, 1500);
    });
  } else {
    document.getElementById("env").style.display = "none";
    document.getElementById("final").style.display = "block";
  }
}

function typeEffect(msg, index, callback) {
  if (index < msg.length) {
    document.getElementById("msg").innerHTML += msg.charAt(index);
    setTimeout(() => typeEffect(msg, index + 1, callback), 40);
  } else {
    callback();
  }
}

document.body.onclick = startStory;
</script>

</body>
</html>
